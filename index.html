<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* Gunakan CSS yang sama seperti sebelum ini */
    body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
    video { width: 100%; border-radius: 5px; }
    .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; cursor: pointer; font-weight: bold; }
    .btn-save { background: green; color: white; }
    #fileList { margin-top: 20px; }
    .card { background: #eee; padding: 10px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; }
  </style>
</head>
<body>

<div class="container">
  <h2>📸 ARKIB BERITA</h2>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>
  
  <button class="btn" onclick="takeSnapshot()" style="background:blue; color:white;">AMBIL GAMBAR</button>
  <input type="text" id="tajuk" placeholder="Tajuk Berita" style="width:94%; padding:10px; margin:10px 0;">
  
  <select id="jenis" style="width:100%; padding:10px; margin-bottom:10px;">
    <option value="Sukan">Sukan</option>
    <option value="Nasional">Nasional</option>
  </select>

  <button class="btn btn-save" id="saveBtn" onclick="saveData()">SIMPAN KE GOOGLE DRIVE</button>
  <p id="status"></p>

  <hr>
  <h3>📂 Rekod Terkini</h3>
  <div id="fileList">Memuatkan rekod...</div>
</div>

<script>
  // GANTIKAN DENGAN URL WEB APP ANDA DARI LANGKAH 1
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzYhQnqAiKbyilZq9U4VvV7u2FLecE7mRGbKVwgyTqag5HJCyagyG7N7f_tTvtJAhUE/exec"; 

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  let capturedImage = null;

  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => { video.srcObject = stream; });

  function takeSnapshot() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    capturedImage = canvas.toDataURL('image/jpeg');
    document.getElementById('status').innerText = "Gambar sedia!";
  }

  function saveData() {
    if (!capturedImage) return alert("Ambil gambar dahulu!");
    const tajuk = document.getElementById('tajuk').value;
    const jenis = document.getElementById('jenis').value;

    document.getElementById('saveBtn').disabled = true;
    document.getElementById('status').innerText = "Sedang menghantar ke Google...";

    // Teknik Fetch untuk hantar data ke Google Script
    fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors", 
      body: JSON.stringify({ image: capturedImage, tajuk: tajuk, jenis: jenis })
    }).then(() => {
      document.getElementById('status').innerText = "✅ Berjaya! Sila semak Sheet.";
      document.getElementById('saveBtn').disabled = false;
      document.getElementById('tajuk').value = "";
    }).catch(err => alert("Ralat: " + err));
  }
</script>
</body>
</html>
