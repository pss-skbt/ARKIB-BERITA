<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #f4f4f4; color: #333; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h2, h3 { text-align: center; color: #2c3e50; }
    video { width: 100%; border-radius: 8px; background: #000; }
    .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; transition: 0.3s; }
    .btn-snap { background: #3498db; color: white; }
    .btn-save { background: #27ae60; color: white; }
    .btn-pdf { background: #e74c3c; color: white; margin-top: 20px; }
    .btn:disabled { background: #ccc; }
    
    input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    
    /* Style Rekod Terkini (Dashboard) */
    #fileList { margin-top: 20px; max-height: 400px; overflow-y: auto; }
    .card { background: #fff; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #3498db; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
    .card-info { flex: 1; }
    .card-info strong { display: block; font-size: 14px; color: #2c3e50; }
    .card-info small { color: #7f8c8d; font-size: 11px; }
    .tag { font-size: 10px; background: #ebf5fb; color: #3498db; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
    .view-link { text-decoration: none; color: #3498db; font-size: 12px; font-weight: bold; border: 1px solid #3498db; padding: 4px 8px; border-radius: 4px; }
    
    #status { font-weight: bold; text-align: center; color: #e67e22; min-height: 20px; }
  </style>
</head>
<body>

<div class="container">
  <h2>📸 ARKIB BERITA</h2>
  
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>
  
  <button class="btn btn-snap" onclick="takeSnapshot()">1. AMBIL GAMBAR</button>
  
  <input type="text" id="tajuk" placeholder="Masukkan Tajuk Berita...">
  
  <select id="jenis">
    <option value="Nasional">Nasional</option>
    <option value="Antarabangsa">Antarabangsa</option>
    <option value="Politik">Politik</option>
    <option value="Ekonomi">Ekonomi</option>
    <option value="Sukan">Sukan</option>
    <option value="Hiburan">Hiburan</option>
    <option value="Pendidikan">Pendidikan</option>
    <option value="Teknologi">Teknologi</option>
    <option value="Kesihatan">Kesihatan</option>
    <option value="Jenayah">Jenayah</option>
    <option value="Tempatan">Tempatan</option>
    <option value="Lain-lain">Lain-lain</option>
  </select>

  <button class="btn btn-save" id="saveBtn" onclick="saveData()">2. SIMPAN KE GOOGLE DRIVE</button>
  <p id="status"></p>

  <hr>
  
  <h3>📂 Rekod Terkini (Sheet)</h3>
  <div id="fileList">Memuatkan rekod...</div>

  <button class="btn btn-pdf" onclick="exportPDF()">📄 EXPORT PDF</button>
</div>

<script>
  // URL Web App Google Script anda
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzYhQnqAiKbyilZq9U4VvV7u2FLecE7mRGbKVwgyTqag5HJCyagyG7N7f_tTvtJAhUE/exec"; 

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  let capturedImage = null;

  // Aktifkan Kamera
  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => { video.srcObject = stream; })
    .catch(err => alert("Kamera gagal: " + err));

  function takeSnapshot() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    capturedImage = canvas.toDataURL('image/jpeg');
    document.getElementById('status').innerText = "📸 Gambar sedia!";
  }

  function saveData() {
    if (!capturedImage) return alert("Sila ambil gambar dahulu!");
    const tajuk = document.getElementById('tajuk').value;
    const jenis = document.getElementById('jenis').value;
    if (!tajuk) return alert("Sila masukkan tajuk!");

    const btn = document.getElementById('saveBtn');
    const status = document.getElementById('status');

    btn.disabled = true;
    status.innerText = "⏳ Sedang menyimpan...";

    fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors", 
      body: JSON.stringify({ action: "upload", image: capturedImage, tajuk: tajuk, jenis: jenis })
    }).then(() => {
      status.innerText = "✅ Berjaya Simpan!";
      btn.disabled = false;
      document.getElementById('tajuk').value = "";
      capturedImage = null;
      setTimeout(loadRecords, 2000); // Refresh dashboard selepas 2 saat
    }).catch(err => {
      status.innerText = "❌ Ralat!";
      btn.disabled = false;
    });
  }

  // Fungsi untuk ambil data dari Google Sheet
  function loadRecords() {
    const listDiv = document.getElementById('fileList');
    
    // Guna JSONP atau fetch jika Code.gs anda support doGet return JSON
    fetch(GAS_URL + "?action=getList")
      .then(res => res.json())
      .then(data => {
        if (data.length === 0) {
          listDiv.innerHTML = "<p style='text-align:center;'>Tiada rekod.</p>";
          return;
        }
        let html = "";
        data.forEach(item => {
          html += `
            <div class="card">
              <div class="card-info">
                <span class="tag">${item.kategori}</span>
                <strong>${item.tajuk}</strong>
                <small>📅 ${item.date}</small>
              </div>
              <a href="${item.url}" target="_blank" class="view-link">BUKA</a>
            </div>`;
        });
        listDiv.innerHTML = html;
      })
      .catch(err => {
        listDiv.innerHTML = "<small>Gagal memuatkan rekod secara automatik.</small>";
      });
  }

  function exportPDF() {
    alert("Menjana PDF... Sila semak tab baru atau Google Drive anda.");
    window.open(GAS_URL + "?action=exportPDF", "_blank");
  }

  // Muat dashboard bila buka page
  window.onload = loadRecords;
</script>

</body>
</html>
