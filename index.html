<!DOCTYPE html>
<html>
<head>
  <style>
    :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --accent: #3498db; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 15px; color: #333; }
    .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: var(--primary); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    
    /* Kamera */
    #video { width: 100%; border-radius: 8px; background: #000; margin-bottom: 10px; }
    #canvas { display: none; }
    
    /* Form */
    input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-bottom: 10px; }
    .btn-view { background: var(--accent); color: white; }
    .btn-save { background: var(--success); color: white; }
    .btn-pdf { background: var(--danger); color: white; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    /* Dashboard */
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee; }
    .search-box { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 15px; }
    .card { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 6px solid var(--primary); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .card-info { flex-grow: 1; }
    .card-info strong { display: block; font-size: 1.1em; }
    .card-info small { color: #888; }
    .tag { font-size: 0.75em; padding: 2px 8px; border-radius: 10px; background: #eee; font-weight: bold; }
    .link-btn { text-decoration: none; background: #f0f0f0; padding: 5px 10px; border-radius: 4px; color: var(--accent); font-size: 0.9em; font-weight: bold; }
    
    #status { font-weight: bold; text-align: center; margin: 10px 0; }
  </style>
</head>
<body>

<div class="container">
  <h2>🗞️ Arkib Surat Khabar</h2>
  
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  
  <button class="btn btn-view" onclick="takeSnapshot()">1. AMBIL GAMBAR (VIEW)</button>
  
  <input type="text" id="tajuk" placeholder="Tajuk Berita / Muka Surat...">
  <select id="jenis">
    <option value="Nasional">Nasional</option>
    <option value="Sukan">Sukan</option>
    <option value="Politik">Politik</option>
    <option value="Ekonomi">Ekonomi</option>
  </select>

  <button class="btn btn-save" id="saveBtn" onclick="saveData()">2. SIMPAN KE DRIVE & SHEET</button>
  <p id="status"></p>

  <div class="dashboard-header">
    <h3>📂 Dashboard</h3>
    <button onclick="exportToPDF()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">Export PDF</button>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Carian pantas...">
    <select id="filterJenis" onchange="filterData()">
      <option value="Semua">Semua Kategori</option>
      <option value="Nasional">Nasional</option>
      <option value="Sukan">Sukan</option>
      <option value="Politik">Politik</option>
      <option value="Ekonomi">Ekonomi</option>
    </select>
  </div>

  <div id="fileList">Memuatkan rekod...</div>
</div>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  let capturedImage = null;
  let allData = [];

  // Akses Kamera
  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => video.srcObject = stream)
    .catch(() => alert("Kamera tidak dijumpai."));

  function takeSnapshot() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    capturedImage = canvas.toDataURL('image/jpeg');
    document.getElementById('status').innerText = "📸 Gambar berjaya diambil!";
  }

  function saveData() {
    if (!capturedImage) return alert("Tangkap gambar dulu!");
    const tajuk = document.getElementById('tajuk').value;
    const jenis = document.getElementById('jenis').value;
    if (!tajuk) return alert("Sila isi tajuk!");

    document.getElementById('saveBtn').disabled = true;
    document.getElementById('status').innerText = "⌛ Sedang menyimpan...";

    google.script.run.withSuccessHandler(res => {
      document.getElementById('status').innerText = res.status;
      document.getElementById('saveBtn').disabled = false;
      document.getElementById('tajuk').value = "";
      loadDashboard();
    }).uploadFile(capturedImage, tajuk, jenis);
  }

  function loadDashboard() {
    google.script.run.withSuccessHandler(data => {
      allData = data;
      renderList(data);
    }).getFilesList();
  }

  function renderList(data) {
    let html = "";
    data.forEach(item => {
      html += `<div class="card">
                <div class="card-info">
                  <span class="tag">${item.kategori}</span>
                  <strong>${item.tajuk}</strong>
                  <small>${item.date}</small>
                </div>
                <a href="${item.url}" target="_blank" class="link-btn">LIHAT</a>
              </div>`;
    });
    document.getElementById('fileList').innerHTML = html || "Tiada rekod.";
  }

  function filterData() {
    const s = document.getElementById('searchInput').value.toLowerCase();
    const j = document.getElementById('filterJenis').value;
    const filtered = allData.filter(d => 
      (d.tajuk.toLowerCase().includes(s)) && (j === "Semua" || d.kategori === j)
    );
    renderList(filtered);
  }

  function exportToPDF() {
    document.getElementById('status').innerText = "⌛ Menjana PDF...";
    google.script.run.withSuccessHandler(res => {
      document.getElementById('status').innerText = res.status;
      window.open(res.url, '_blank');
    }).generatePDF();
  }

  window.onload = loadDashboard;
</script>
</body>
</html>
